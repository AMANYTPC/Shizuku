name: App

on:
  push:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Replace Shizuku API with AMANYTPC fork (patch-1)
        run: |
          rm -rf api
          git clone -b patch-1 https://github.com/AMANYTPC/Shizuku-API.git api

      - name: Verify API
        run: |
          cd api
          git branch
          git log -1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true
          ./gradlew :manager:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shizuku-debug
          path: manager/build/outputs/apk/debug/
